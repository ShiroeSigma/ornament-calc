<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ornament Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d4af37;
            --bg: #f8f9fa;
            --text: #212529;
            --border: #dee2e6;
            --danger: #dc3545;
            --success-text: #2e7d32;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('bgpic.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            padding: 10px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Navigation Button */
        .nav-wrapper {
            width: 100%;
            max-width: 900px;
            margin-top: 10px;
            display: flex;
            justify-content: flex-end; /* Aligns button to the right */
        }
        .nav-link {
            display: inline-block;
            padding: 8px 16px;
            background-color: rgba(255, 255, 255, 0.95);
            color: var(--primary); /* Gold colored text */
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.2s;
            border: 1px solid var(--primary);
        }
        .nav-link:hover {
            background-color: var(--primary);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .main-wrapper {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 15px;
            max-width: 900px;
            width: 100%;
            margin-top: 10px;
        }

        @media (min-width: 768px) {
            .main-wrapper {
                grid-template-columns: 50% 48%; 
            }
        }

        .box {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            backdrop-filter: blur(8px);
        }

        .sticky-results {
            position: sticky;
            top: 10px;
            height: fit-content;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.4em;
            font-weight: 700;
        }

        .datetime {
            text-align: center;
            font-size: 0.85em;
            color: #495057;
            font-weight: 500;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 10px;
            background: #ffffff;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #343a40;
            font-size: 0.85em;
        }

        input[type="number"], select, input[type="text"] {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px; 
            background-color: #fff;
            transition: border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }

        input[type="number"]:focus, select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        .readonly-text {
            background-color: #e9ecef !important;
            color: #495057;
            font-weight: bold;
        }

        .results-section {
            background: rgba(232, 245, 233, 0.7);
            border: 1px solid #c8e6c9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95em;
            font-weight: 500;
        }
        .breakdown-row {
            font-size: 0.9em;
            color: #495057;
            margin-bottom: 4px;
        }
        .subtotal-row {
            border-top: 1px solid #a5d6a7;
            padding-top: 8px;
            margin-top: 8px;
            font-weight: 700;
            color: #212529;
        }
        .result-row.total {
            font-size: 1.25em;
            font-weight: 800;
            color: var(--success-text);
            border-top: 2px dashed #a5d6a7;
            padding-top: 10px;
            margin-top: 8px;
        }

        /* Negotiation Tool Styling */
        .nego-tool {
            border-top: 2px dashed #a5d6a7;
            margin-top: 15px;
            padding-top: 12px;
        }
        .nego-title {
            color: var(--success-text);
            font-size: 1.05em;
            font-weight: 700;
            margin-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }
        .nego-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .nego-input {
            background: #fff;
            border: 2px solid var(--success-text) !important;
        }
        .discount-text {
            color: var(--danger) !important;
            background-color: #ffe8e8 !important;
        }

        .reset-btn {
            width: 100%;
            padding: 10px;
            background-color: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .reset-btn:hover {
            background-color: var(--danger);
            color: white;
        }
    </style>
</head>
<body>

<div class="nav-wrapper">
    <a href="silver.html" class="nav-link">Switch to Silver Calculator →</a>
</div>

<div class="main-wrapper">
    
    <div class="box inputs-column">
        <h2>Ornament Value Calculator</h2>
        <div id="datetime" class="datetime">Loading time...</div>

        <div class="input-group">
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>22K916 Rate (per 10g)</label>
                    <input type="number" id="rate22k" placeholder="Enter rate..." oninput="rateChanged()">
                </div>
                <div style="flex: 1;">
                    <label>18K750 Rate (per 10g)</label>
                    <input type="number" id="rate18k" placeholder="Enter rate..." oninput="rateChanged()">
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Type of Ornament</label>
            <select id="ornamentType" onchange="handleOrnamentChange()">
                <option value="gold" selected>Only gold</option>
                <option value="sankha">Sankha</option>
                <option value="sankha_ring">Sankha Ring</option>
                <option value="bronze">Bronze</option>
                <option value="others">Others</option>
            </select>
        </div>

        <div class="input-group">
            <label>Pieces</label>
            <select id="pieces" onchange="handlePiecesChange()">
                <option value="1">1</option>
                <option value="2" selected>2</option>
            </select>
        </div>

        <div class="input-group">
            <label>Carat</label>
            <select id="carat" onchange="handleCaratChange()">
                <option value="22K916" selected>22K916</option>
                <option value="18K750">18K750</option>
            </select>
        </div>

        <div class="input-group">
            <label>Weight (Grams)</label>
            <input type="number" id="weight" step="0.001" placeholder="e.g. 5.370" oninput="handleInput()">
        </div>

        <div class="input-group">
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>MC (₹ Amount)</label>
                    <input type="number" id="mc" value="1999" oninput="syncFromAmount()">
                </div>
                <div style="flex: 1;">
                    <label>MC (%)</label>
                    <input type="number" id="mcPercent" value="0" step="0.01" oninput="syncFromPercent()">
                </div>
            </div>
        </div>

        <div class="input-group">
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Hallmark Charges</label>
                    <input type="number" id="hm" class="readonly-text" readonly value="150">
                </div>
                <div style="flex: 1;">
                    <label>Other Charges</label>
                    <input type="number" id="otherCharges" value="0" oninput="handleInput()">
                </div>
            </div>
        </div>
    </div>

    <div class="box sticky-results">
        <h2 style="color: var(--success-text);">Final Calculation</h2>
        
        <div class="results-section">
            <div class="result-row breakdown-row">
                <span>Gold Value:</span>
                <span id="outGoldValue">₹ 0.00</span>
            </div>
            <div class="result-row breakdown-row">
                <span>Making Charge:</span>
                <span id="outMakingCharge">₹ 0.00</span>
            </div>
            <div class="result-row breakdown-row">
                <span>Hallmark Charge:</span>
                <span id="outHallmarkCharge">₹ 0.00</span>
            </div>
            <div class="result-row breakdown-row">
                <span>Other Charge:</span>
                <span id="outOtherCharge">₹ 0.00</span>
            </div>
            
            <div class="result-row subtotal-row">
                <span>Value Before GST:</span>
                <span id="outBaseValue">₹ 0.00</span>
            </div>
            
            <div class="result-row">
                <span>GST (3%):</span>
                <span id="outGst">₹ 0.00</span>
            </div>
            
            <div class="result-row total">
                <span>Ornament Value:</span>
                <span id="outTotal">₹ 0.00</span>
            </div>

            <div class="nego-tool">
                <h3 class="nego-title">Negotiation Dashboard</h3>
                
                <div class="input-group" style="margin-bottom: 10px;">
                    <label>Customer Wants to Pay (₹)</label>
                    <input type="number" id="customerTotal" class="nego-input" placeholder="e.g. 15000" oninput="calculate()">
                </div>

                <div class="nego-grid">
                    <div>
                        <label>New Effective MC (₹)</label>
                        <input type="text" id="effMcAmount" class="readonly-text discount-text" readonly value="₹ 0.00">
                    </div>
                    <div>
                        <label>New Effective MC (%)</label>
                        <input type="text" id="effMcPercent" class="readonly-text discount-text" readonly value="0.00%">
                    </div>
                </div>
            </div>
        </div>

        <button class="reset-btn" onclick="clearAllData()">Clear All Data</button>
    </div>

</div>

<script>
    // 1. Live Clock
    function updateDateTime() {
        const now = new Date();
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('datetime').innerText = now.toLocaleDateString(undefined, dateOptions) + ' | ' + now.toLocaleTimeString(undefined, timeOptions);
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // 2. Load Saved Data
    window.onload = function() {
        const inputs = ['rate22k', 'rate18k', 'weight', 'mc', 'mcPercent', 'otherCharges'];
        inputs.forEach(id => {
            const saved = localStorage.getItem(id);
            if(saved !== null) document.getElementById(id).value = saved;
        });

        const selects = ['ornamentType', 'pieces', 'carat'];
        selects.forEach(id => {
            const saved = localStorage.getItem(id);
            if(saved !== null) document.getElementById(id).value = saved;
        });

        handlePiecesChange(false); 
        syncFromAmount(); 

        // Enter Key Tab Functionality 
        const focusableElements = document.querySelectorAll('.inputs-column input:not([readonly]), .inputs-column select, #customerTotal');
        focusableElements.forEach((el, index) => {
            el.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextElement = focusableElements[index + 1];
                    if (nextElement) {
                        nextElement.focus();
                    } else {
                        el.blur(); 
                    }
                }
            });
        });
    };

    // --- TWO-WAY BINDING LOGIC FOR MAKING CHARGE ---
    function getActiveRate1g() {
        const carat = document.getElementById('carat').value;
        let rate10g = parseFloat(document.getElementById(carat === '22K916' ? 'rate22k' : 'rate18k').value) || 0;
        return rate10g / 10;
    }

    function syncFromAmount() {
        const rate1g = getActiveRate1g();
        const mcAmt = parseFloat(document.getElementById('mc').value) || 0;
        
        if (rate1g > 0) {
            const percent = (mcAmt / rate1g) * 100;
            document.getElementById('mcPercent').value = percent.toFixed(2);
        } else {
            document.getElementById('mcPercent').value = 0;
        }
        handleInput(); 
    }

    function syncFromPercent() {
        const rate1g = getActiveRate1g();
        const mcPct = parseFloat(document.getElementById('mcPercent').value) || 0;
        
        if (rate1g > 0) {
            const amount = (mcPct / 100) * rate1g;
            document.getElementById('mc').value = amount.toFixed(2);
        }
        handleInput(); 
    }

    function rateChanged() {
        syncFromAmount();
    }

    // 3. Dynamic Field Handlers
    function handlePiecesChange(triggerSave = true) {
        const pieces = document.getElementById('pieces').value;
        const type = document.getElementById('ornamentType').value;
        
        if (type === "bronze") {
            document.getElementById('hm').value = 0;
        } else {
            document.getElementById('hm').value = (pieces === "1") ? 100 : 150;
        }

        if(triggerSave) handleInput();
    }

    function handleCaratChange() {
        const carat = document.getElementById('carat').value;
        document.getElementById('mc').value = (carat === "22K916") ? 1999 : 1499;
        syncFromAmount(); 
    }

    function handleOrnamentChange() {
        const type = document.getElementById('ornamentType').value;
        const otherInput = document.getElementById('otherCharges');
        const mcInput = document.getElementById('mc');
        const hmInput = document.getElementById('hm');
        const pieces = document.getElementById('pieces').value;
        
        hmInput.value = (pieces === "1") ? 100 : 150;

        if (type === "gold") {
            otherInput.value = 0;
        } else if (type === "sankha") {
            otherInput.value = 450; 
        } else if (type === "sankha_ring") {
            mcInput.value = 1999;
            otherInput.value = 220;
        } else if (type === "bronze") {
            mcInput.value = 1499;
            otherInput.value = 0;
            hmInput.value = 0; 
        } else if (type === "others") {
            otherInput.value = 450;
        }
        syncFromAmount(); 
    }

    // 4. Handle Saves & Trigger Calculation
    function handleInput() {
        const inputs = ['rate22k', 'rate18k', 'weight', 'mc', 'mcPercent', 'otherCharges'];
        inputs.forEach(id => localStorage.setItem(id, document.getElementById(id).value));

        const selects = ['ornamentType', 'pieces', 'carat'];
        selects.forEach(id => localStorage.setItem(id, document.getElementById(id).value));

        calculate();
    }

    function clearAllData() {
        if(confirm("Are you sure you want to clear all rates and reset the calculator?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // --- REVERSE NEGOTIATION CALCULATOR ---
    function calculateReverseMC(originalTotal) {
        const custTotalStr = document.getElementById('customerTotal').value;
        const custTotal = parseFloat(custTotalStr);
        
        const weight = parseFloat(document.getElementById('weight').value) || 0;
        const hm = parseFloat(document.getElementById('hm').value) || 0;
        const otherCharge = parseFloat(document.getElementById('otherCharges').value) || 0;
        const rate1g = getActiveRate1g();

        // Calculate only if all necessary numbers exist
        if (custTotalStr && custTotal > 0 && weight > 0 && rate1g > 0 && originalTotal > 0) {
            
            // 1. Strip the GST back out
            const targetBaseValue = custTotal / 1.03; 
            const goldValue = rate1g * weight;
            
            // 2. Isolate the Total Making Charge left over
            const targetTotalMC = targetBaseValue - goldValue - hm - otherCharge;

            // 3. Convert that back to the format you typed it in (Per Gram or Flat)
            let effectiveMcInput = 0;
            if (weight > 1) {
                effectiveMcInput = targetTotalMC / weight;
            } else {
                effectiveMcInput = targetTotalMC;
            }

            // 4. Calculate the new effective percentage
            const effectivePercent = (effectiveMcInput / rate1g) * 100;

            // Display results (showing exactly what the NEW MC is)
            document.getElementById('effMcAmount').value = "₹ " + effectiveMcInput.toFixed(2);
            document.getElementById('effMcPercent').value = effectivePercent.toFixed(2) + "%";
            
        } else {
            document.getElementById('effMcAmount').value = "₹ 0.00";
            document.getElementById('effMcPercent').value = "0.00%";
        }
    }

    // 5. Core Calculation Logic
    function calculate() {
        const weight = parseFloat(document.getElementById('weight').value) || 0;
        const mc = parseFloat(document.getElementById('mc').value) || 0;
        const hm = parseFloat(document.getElementById('hm').value) || 0;
        const otherCharge = parseFloat(document.getElementById('otherCharges').value) || 0;
        const rate1g = getActiveRate1g();

        let goldValue = 0;
        let totalMakingCharge = 0;
        let valueBeforeGST = 0;

        if (weight > 0) {
            if (weight > 1) {
                // Formula 1: Weight Greater than 1gm
                goldValue = rate1g * weight;
                totalMakingCharge = mc * weight; 
                valueBeforeGST = goldValue + totalMakingCharge + hm + otherCharge;
            } else {
                // Formula 2: Weight Less than or equal to 1gm
                goldValue = rate1g * weight;
                totalMakingCharge = mc; // Applied as a flat amount
                valueBeforeGST = goldValue + totalMakingCharge + hm + otherCharge;
            }
        }

        // GST & Total
        const gst = valueBeforeGST > 0 ? (valueBeforeGST * 0.03) : 0;
        const total = valueBeforeGST + gst;

        // Format and Display
        const formatMoney = (amt) => "₹ " + amt.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        
        document.getElementById('outGoldValue').innerText = formatMoney(goldValue);
        document.getElementById('outMakingCharge').innerText = formatMoney(totalMakingCharge);
        document.getElementById('outHallmarkCharge').innerText = formatMoney(weight > 0 ? hm : 0);
        document.getElementById('outOtherCharge').innerText = formatMoney(weight > 0 ? otherCharge : 0);
        
        document.getElementById('outBaseValue').innerText = formatMoney(valueBeforeGST);
        document.getElementById('outGst').innerText = formatMoney(gst);
        document.getElementById('outTotal').innerText = formatMoney(total);

        // ALWAYS SYNC NEGOTIATION DASHBOARD
        calculateReverseMC(total); 
    }
</script>

</body>
</html>
